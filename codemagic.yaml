workflows:
  android-release:
    name: MindPuzzles India AAB Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
      java: 17
    scripts:
      - name: Build AAB
        script: |
          set -e

          # Find source
          PUBSPEC=$(find $CM_BUILD_DIR -name "pubspec.yaml" | grep -v ".dart_tool" | grep -v "flutter/packages" | head -1)
          SRC=$(dirname "$PUBSPEC")
          echo "Source found at: $SRC"

          # Create fresh Flutter project
          cd /tmp
          rm -rf freshapp
          flutter create --org com.mindpuzzles --project-name mindpuzzles freshapp
          echo "Fresh project ready"

          # Copy our code
          rm -rf /tmp/freshapp/lib
          cp -r "$SRC/lib" /tmp/freshapp/lib
          cp "$SRC/pubspec.yaml" /tmp/freshapp/pubspec.yaml
          mkdir -p /tmp/freshapp/assets
          echo "Code copied"

          # Build release AAB
          cd /tmp/freshapp
          flutter pub get
          flutter build appbundle --release --build-name=1.0.0 --build-number=1

          # Export
          AAB=$(find /tmp/freshapp/build -name "*.aab" | head -1)
          echo "AAB: $AAB"
          cp "$AAB" "$CM_EXPORT_DIR/MindPuzzlesIndia.aab"
          ls -lh "$CM_EXPORT_DIR/"

    artifacts:
      - $CM_EXPORT_DIR/MindPuzzlesIndia.aab
